server:
  port: 8080

spring:
  application:
    name: code-review-agent
  datasource:
    url: jdbc:mysql://localhost:3306/code_review_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:qwer1234}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:root}
      password: ${REDIS_PASSWORD:qwer1234}
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn}
      api-key: ${OPENAI_API_KEY:sk-wotxcpcnxztkgrdqrzytqtmqxonxerxjuwgboptnplhrvbsi}
      chat:
        base-url: ${OPENAI_CHAT_BASE_URL:https://api.siliconflow.cn}
        api-key: ${OPENAI_CHAT_API_KEY:${OPENAI_API_KEY:sk-wotxcpcnxztkgrdqrzytqtmqxonxerxjuwgboptnplhrvbsi}}
        completions-path: ${OPENAI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${OPENAI_CHAT_MODEL:Qwen/Qwen3-Coder-30B-A3B-Instruct}
      embedding:
        base-url: ${OPENAI_EMBEDDING_BASE_URL:https://api.siliconflow.cn}
        api-key: ${OPENAI_EMBEDDING_API_KEY:${OPENAI_API_KEY:sk-wotxcpcnxztkgrdqrzytqtmqxonxerxjuwgboptnplhrvbsi}}
        embeddings-path: ${OPENAI_EMBEDDING_PATH:/v1/embeddings}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:192.168.141.128}
          port: ${MILVUS_PORT:19530}
          connect-timeout-ms: ${MILVUS_CONNECT_TIMEOUT_MS:10000}
          rpc-deadline-ms: ${MILVUS_RPC_DEADLINE_MS:30000}
          idle-timeout-ms: ${MILVUS_IDLE_TIMEOUT_MS:120000}
        database-name: ${MILVUS_DATABASE:default}
        collection-name: ${MILVUS_COLLECTION:code_review_knowledge}
        embedding-dimension: ${OPENAI_EMBEDDING_DIMENSION:1024}
        initialize-schema: ${MILVUS_INIT_SCHEMA:true}

logging:
  level:
    root: info
    com.heima.codereview: debug
    com.heima.codereview.api.ai.SpringAiAlibabaAgentTextGenerator: debug
    org.springframework.ai: debug
    org.springframework.http.client: debug
    okhttp3: debug
    okio: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr([%thread]){cyan} %clr(%-5level){FATAL=red, ERROR=red, WARN=yellow, INFO=green, DEBUG=green, TRACE=blue} %clr(%logger{36}){magenta} - %msg%n"

code-review:
  ai:
    enabled: true
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:15000}
    read-timeout-ms: ${AI_READ_TIMEOUT_MS:120000}
    write-timeout-ms: ${AI_WRITE_TIMEOUT_MS:120000}
    call-timeout-ms: ${AI_CALL_TIMEOUT_MS:180000}
  sse:
    heartbeat-interval-ms: 30000
  memory:
    window-size: 20
  rag:
    chunking:
      semantic-enabled: ${CODE_REVIEW_RAG_SEMANTIC_CHUNKING_ENABLED:true}
      semantic-breakpoint-threshold: ${CODE_REVIEW_RAG_SEMANTIC_BREAKPOINT_THRESHOLD:0.58}
    hybrid:
      enabled: ${CODE_REVIEW_RAG_HYBRID_ENABLED:true}
      collection-name: ${CODE_REVIEW_RAG_HYBRID_COLLECTION:}
    rerank:
      enabled: ${CODE_REVIEW_RAG_RERANK_ENABLED:true}
  pdf:
    author: ${CODE_REVIEW_PDF_AUTHOR:智能代码审查系统}
  local-code:
    allowed-paths:
      - ${CODE_REVIEW_LOCAL_PATH_1:D:/test}
      - ${CODE_REVIEW_LOCAL_PATH_2:D:/projects}
      - ${CODE_REVIEW_LOCAL_PATH_3:C:/workspace}
      - ${CODE_REVIEW_LOCAL_PATH_4:E:/AIAgent}
    auto-write: ${CODE_REVIEW_LOCAL_AUTO_WRITE:false}
  web-search:
    # Supported providers: serper, tavily, searxng
    # Example base-url values:
    # - serper: https://google.serper.dev/search
    # - tavily: https://api.tavily.com/search
    # - searxng: https://your-searxng-host/search
    enabled: ${WEB_SEARCH_ENABLED:true}
    provider: ${WEB_SEARCH_PROVIDER:tavily}
    api-key: ${WEB_SEARCH_API_KEY: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}
    base-url: ${WEB_SEARCH_BASE_URL:https://api.tavily.com/search}
    region: ${WEB_SEARCH_REGION:us}
    language: ${WEB_SEARCH_LANGUAGE:zh-cn}
    search-depth: ${WEB_SEARCH_SEARCH_DEPTH:basic}
    include-answer: ${WEB_SEARCH_INCLUDE_ANSWER:true}
    snippet-max-length: ${WEB_SEARCH_SNIPPET_MAX_LENGTH:280}
